apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "temporal-worker-controller.labels" . | nindent 4 }}
    control-plane: controller-manager
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: worker-controller
    app.kubernetes.io/part-of: worker-controller
    tags.datadoghq.com/service: "temporal-worker-controller"
spec:
  selector:
    matchLabels:
      {{- include "temporal-worker-controller.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "temporal-worker-controller.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
        tags.datadoghq.com/service: "temporal-worker-controller"
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect
            - --metrics-bind-address
            - ":8080"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }} 