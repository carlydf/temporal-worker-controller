---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-manager-role
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: temporal-worker-controller
    app.kubernetes.io/part-of: temporal-worker-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - events
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-temporal-role
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: temporal-worker-controller
    app.kubernetes.io/part-of: temporal-worker-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
- apiGroups:
  - temporal.io
  resources:
  - temporalworkerdeployments
  - temporalconnections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - temporal.io
  resources:
  - temporalworkerdeployments/finalizers
  - temporalconnections/finalizers
  verbs:
  - update
- apiGroups:
  - temporal.io
  resources:
  - temporalworkerdeployments/status
  - temporalconnections/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-temporal-rolebinding
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: temporal-worker-controller
    app.kubernetes.io/part-of: temporal-worker-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-temporal-role
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
